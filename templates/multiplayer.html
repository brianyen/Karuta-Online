<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Karuta Room</title>
    <style>
      #game-space {
        border: 1px solid black;
        position: relative;
        width: 100%;
        height: auto;
        display: grid;
        gap: 3px;
        grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      }
      #stats-box {
        position: absolute;
        right: 0%;
        width: 30%;
        bottom: -200px;
        height: 180px;
        border: 1px solid gray;
      }
      #go-home {
        position: absolute;
        right: 100px;
        top: 30px;
        padding: 5px;
      }
      #go-practice {
        position: absolute;
        right: 30px;
        top: 30px;
        padding: 5px;
      }
      #go-edit {
          position: absolute;
          right: 170px;
          top: 30px;
          padding: 5px;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
      li {
        cursor: pointer;
        padding: 5px;
        border-bottom: 1px solid #ccc;
      }
      li.played {
        background-color: gray;
      }
      li.correct {
        background-color: #8cb88c
      }
      li.rerolled {
        background-color: #d57a64
      }
      li:hover {
        background-color: #f0f0f0;
      }
      .right-align {
        float: right;
      }
      .customInput {
        float: right;
      }
      #customInput {
        width: 80%;
        height: 400px;
        display: none;
        z-index: 1000;
        resize: none;
      }
      .card {
        width: 110px;
        height: 220px;
        margin: 5px;
        border: 1px solid gray;
        overflow-wrap: break-word;
        overflow-y: hidden;
        text-align: center;
        font-size: 14px;
        cursor: pointer;
      }
      .card-image {
        height: 67%;
        top: 1px;
        max-width: 100%;
        max-height: 67%;
        object-fit: contain;
      }
      .card-text {
        height: 33%;
        width: 95%;
        bottom: 1px;
        background-color: white;
      }
      .navigation:hover {
        background-color: lightblue;
        cursor: default;
        color: black;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>Karuta Room Code: {{ room }}</h1>
    <h2 id="deckDisplay"></h2>
    <a href="/" onclick="return confirmNavigation()"><div id="go-home" class="navigation">Home</div></a>
    <a href="/practice" onclick="return confirmNavigation()"><div id="go-practice" class="navigation">Practice</div></a>
    <h2>Downloaded Playlists</h2>
    <select id="playlistSelect"></select>
    <button id="loadPlaylist">Load Playlist</button>
    <button id="generateDeck">Generate/Reset Deck</button>
    <button class="customInput" id="loadCustom" onclick="loadCustom()">Load Mapping</button>
    <hr></hr>
    <button id="pauseSong">Pause/Resume Current Song</button>
    <button id="playRandom">Play Random Song</button>
    <h2>Game</h2>
    <div id="game-space"></div>
    <h2>Autoplay Settings</h2>
    <label for="autoplaySlider">Play Duration (seconds): </label>
    <input type="range" id="autoplaySlider" min="0" max="60" value="30"/>
    <span id="sliderValue">30</span> seconds
    <br/>
    <label for="autoplaySwitch">Autoplay: </label>
    <input type="checkbox" id="autoplaySwitch"/>
    <button id="playNext">Play Next Song</button>
    <p>
      Countdown:
      <span id="countdown">0</span> seconds
    </p>
    <h2>Song Counters</h2>
    <p>
      Total Songs: <span id="totalSongs">0</span> | Songs Left:
      <span id="songsLeft">0</span>
    </p>

    <h2>Audio Player</h2>
    <button id="toggleAudioPlayer">Hide Audio Player Visibility</button><br>
    <div id="audio">
      <p id="currentSong">None</p>
      <audio id="audioPlayer" controls></audio>
    </div>
    <h2>Played Songs from Loaded Playlist</h2>
    <button id="togglePlaylistVisibility">Hide Playlist Visibility</button>
    <div id="playlists">
      <ul id="played-song-list"></ul>
      <h2>Loaded Playlist Songs (Unplayed)</h2>
      <ul id="song-list"></ul>
    </div>
    
    <h2>Individual Card Stats</h2>
    <button id="toggleStatsVisibility">Hide Card Stats</button>
    <div id="card-stats"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
      let params = new URLSearchParams(document.location.search);
      let room_key = params.get("room"); 
      let deckDisplayEl = document.getElementById("deckDisplay");
      let deck;
      let availableSongs = [];

      let playerID = sessionStorage.getItem("playerID") || crypto.randomUUID();
      sessionStorage.setItem("playerID", playerID);
      const socket = io();

      socket.on('connect', () => {
        console.log("Connection established");
        socket.emit('join_game', { room: room_key, player_id: playerID })
      });

      socket.on('create_success_1p', (e) => {
        deck = e.deck.replace(/\.[a-zA-Z0-9]+$/, '');
        deckDisplayEl.innerHTML = "Deck: " + deck;
      });

      socket.on('create_success_2p', (e) => {
        deck = e.deck.replace(/\.[a-zA-Z0-9]+$/, '');
        deckDisplayEl.innerHTML = "Deck: " + deck;
        const arraysEqual = (a, b) => a.length === b.length && a.every((val, index) => val === b[index]);
        if (!arraysEqual(e.songs, availableSongs)) {
          availableSongs = e.songs;
          availableSongs.forEach((song) => {
            gameSpaceEl.appendChild(createCardElement(song));
          })
        }
      });

      socket.on('room_missing', () => [
        alert("attempted to join nonexistent or invalid room")
      ])

      socket.on('room_full', () => {
        alert("issue while joining room, it may be full")
      })

      let cardstatsEl = document.getElementById("card-stats");
      let autoplaySliderEl = document.getElementById("autoplaySlider");
      let countdownEl = document.getElementById("countdown");
      let audioPlayerEl = document.getElementById("audioPlayer");
      let sliderValueEl = document.getElementById("sliderValue");
      let pauseSongEl = document.getElementById("pauseSong");
      let playRandomEl = document.getElementById("playRandom");
      let playNextEl = document.getElementById("playNext");
      let playlistSelectEl = document.getElementById("playlistSelect");
      let gameSpaceEl = document.getElementById("game-space");
      let saveNameEl = document.getElementById("playlistName");

      let playedSongsOrder = JSON.parse(localStorage.getItem("playedSongs") || "[]");
      let autoplayTimer = null;
      let countdownInterval = null;
      let deckname = "";
      let customInputString = "";

      let deckIsGenerated = false;
      let deckList = {};
      let cardNameMapping = {};
      let images = {};
      let cardsLeft = 0;
      
      let songStart = 0;

      let stats = {}

      let correct = true;
      let dragged = null;

      function getDisplayName(song) {
        if (cardNameMapping[song] != undefined) {
          return cardNameMapping[song];
        }
        return song.endsWith(".mp3") ? song.slice(0, -4) : song;
      }

      function updateSongListUI() {
        let songList = document.getElementById("song-list");
        songList.innerHTML = "";
        if (!availableSongs || availableSongs.length === 0) {
          songList.innerHTML = "<li>No playlist loaded.</li>";
          document.getElementById("totalSongs").innerText = "0";
          document.getElementById("songsLeft").innerText = "0";
          return;
        }
        const unplayedSongs = availableSongs.filter((song) => !playedSongsOrder.includes(song));
        document.getElementById("totalSongs").innerText = availableSongs.length;
        document.getElementById("songsLeft").innerText = unplayedSongs.length;
        unplayedSongs.forEach((song) => {
          let li = document.createElement("li");
          li.textContent = getDisplayName(song);
          li.onclick = function () {
            cancelAutoplayTimer();
            playSong(song);
          };
          songList.appendChild(li);
        });
      }

      function updatePlayedSongsUI() {
        let playedList = document.getElementById("played-song-list");
        playedList.innerHTML = "";
        if (!availableSongs || availableSongs.length === 0) return;
        const playedSongs = playedSongsOrder.filter((song) => availableSongs.includes(song));
        playedSongs.forEach((song) => {
          let li = document.createElement("li");
          li.textContent = getDisplayName(song);
          li.classList.add("played");
          li.onclick = function () {
            cancelAutoplayTimer();
            playSong(song);
          };
          playedList.appendChild(li);
        });
      }

      function updateCardStatsUI() {
        cardstatsEl.innerHTML = "";
        if (deckList.length === 0) {
          return;
        }

        const playedCards = Object.keys(deckList).filter((songTitle) => {
          return "timeTaken" in deckList[songTitle];
        });
        playedCards.sort((s1, s2) => {
          if (deckList[s1]["status"] === "rerolled" && deckList[s2]["status"] === "correct") {
            return 1;
          } else if (deckList[s1]["status"] === "correct" && deckList[s2]["status"] === "rerolled") {
            return -1;
          } else {
            return deckList[s1]["timeTaken"] - deckList[s2]["timeTaken"];
          }
        });

        playedCards.forEach((songTitle) => {
          let li = document.createElement("li");
          li.innerHTML = `${deckList[songTitle]["timeTaken"] / 1000}: ${getDisplayName(songTitle)}<span class="right-align">Remaining Cards After Taken: ${deckList[songTitle]["cardsLeft"]}</span>`;
          li.classList.add(deckList[songTitle]["status"]);
          cardstatsEl.appendChild(li);
        })
      }

      function startAutoplayTimer() {
        let duration = parseInt(autoplaySliderEl.value, 10);
        let secondsLeft = duration;
        countdownEl.innerText = secondsLeft;
        countdownInterval = setInterval(() => {
          secondsLeft--;
          if (secondsLeft <= 0) {
            clearInterval(countdownInterval);
            countdownInterval = null;
          }
          countdownEl.innerText = secondsLeft;
        }, 1000);
        autoplayTimer = setTimeout(() => {
          cancelAutoplayTimer();
          playNextSong();
        }, duration * 1000);
      }

      function cancelAutoplayTimer() {
        if (autoplayTimer !== null) {
          clearTimeout(autoplayTimer);
          autoplayTimer = null;
        }
        if (countdownInterval !== null) {
          clearInterval(countdownInterval);
          countdownInterval = null;
        }
        countdownEl.innerText = "0";
      }

      async function playNextSong() {
        if (!availableSongs || availableSongs.length === 0) {
          alert("No playlist loaded.");
          return;
        }
        const unplayedSongs = availableSongs.filter((song) => !playedSongsOrder.includes(song));
        if (unplayedSongs.length === 0) {
          alert("No unplayed songs available. Reset played songs to choose again.");
          return;
        }
        if (!deckIsGenerated) {
          alert("Generate a deck first.");
          return;
        }

        await handlePreviousSong();
        
        let randomSong = unplayedSongs[Math.floor(Math.random() * unplayedSongs.length)];

        songStart = performance.now();
        correct = false;

        playSong(randomSong);
      }

      function playSong(song) {
        cancelAutoplayTimer();
        let audioSource;
        audioSource = "stored-songs/" + deckname + "/" + encodeURIComponent(song);
        audioPlayerEl.src = audioSource;
        audioPlayerEl.load();

        function attemptPlayback() {
          audioPlayerEl.play().catch((error) => {
            console.warn("Playback failed (promise rejection), retrying...", error);
            setTimeout(attemptPlayback, 500);
          });
        }

        function onCanPlayThrough() {
          audioPlayerEl.removeEventListener("canplaythrough", onCanPlayThrough);
          autoplaySlider.min = 0;
          autoplaySlider.max = Math.floor(audioPlayerEl.duration);
          if (parseInt(autoplaySlider.value, 10) > audioPlayerEl.duration) {
            autoplaySlider.value = Math.floor(audioPlayerEl.duration / 2);
          }
          sliderValueEl.innerText = autoplaySliderEl.value;
          let halfDuration = audioPlayerEl.duration / 2;
          let randomStart = Math.random() * halfDuration;
          audioPlayerEl.currentTime = randomStart;

          attemptPlayback();
          
          audioPlayerEl.onerror = function () {
            console.warn("Audio error event fired, retrying playback...");
            setTimeout(attemptPlayback, 500);
          };
          if (document.getElementById("autoplaySwitch").checked) {
            startAutoplayTimer();
          }
        }
        audioPlayerEl.addEventListener("canplaythrough", onCanPlayThrough);

        document.getElementById("currentSong").innerText = getDisplayName(song);
        const index = playedSongsOrder.indexOf(song);
        if (index !== -1) {
          playedSongsOrder.splice(index, 1);
        }
        playedSongsOrder.unshift(song);
        localStorage.setItem("playedSongs", JSON.stringify(playedSongsOrder));
        updateSongListUI();
        updatePlayedSongsUI();
      }

      pauseSongEl.addEventListener("click", function() {
        if (audioPlayerEl.paused) {
          audioPlayerEl.play();
        } else {
          audioPlayerEl.pause();
        }
      });

      audioPlayerEl.addEventListener("play", function() {
        pauseSongEl.innerHTML = "Pause Current Song";
      });

      audioPlayerEl.addEventListener("pause", function() {
        pauseSongEl.innerHTML = "Play Current Song";
      });

      playRandomEl.addEventListener("click", async function () {
        cancelAutoplayTimer();
        if (!availableSongs || availableSongs.length === 0) {
          alert("No playlist loaded.");
          return;
        }
        const unplayedSongs = availableSongs.filter((song) => !playedSongsOrder.includes(song));
        if (unplayedSongs.length === 0) {
          alert("No unplayed songs available. Reset played songs to choose again.");
          return;
        }
        if (!deckIsGenerated) {
          alert("Generate a deck first.");
          return;
        }

        await handlePreviousSong();
        
        let randomSong = unplayedSongs[Math.floor(Math.random() * unplayedSongs.length)];
        //console.log("random song: " + randomSong);

        songStart = performance.now();
        correct = false;
        
        playSong(randomSong);
      });

      playNextEl.addEventListener("click", function () {
        cancelAutoplayTimer();
        playNextSong();
      });

      autoplaySliderEl.addEventListener("input", function () {
        sliderValueEl.innerText = this.value;
      });

      document.getElementById("toggleAudioPlayer").addEventListener("click", function (event) {
        toggleDivVisibility(event, "audio", "Audio Player");
      });

      document.getElementById("togglePlaylistVisibility").addEventListener("click", function (event) {
        toggleDivVisibility(event, "playlists", "Playlist");
      });

      document.getElementById("toggleStatsVisibility").addEventListener("click", function(event) {
        toggleDivVisibility(event, "card-stats", "Card");
      });

      function toggleDivVisibility(event, toToggle, toggleText) {
        let toggleEl = document.getElementById(toToggle);
        if (toggleEl.style.display === "none") {
          toggleEl.style.display = "block";
          event.target.innerHTML = `Hide ${toggleText} Visibility`;
        } else {
          toggleEl.style.display = "none";
          event.target.innerHTML = `Show ${toggleText} Visibility`;
        }
      }

      function loadPlaylistsList() {
        fetch("/get-playlists")
          .then((response) => response.json())
          .then((data) => {
            playlistSelectEl.innerHTML = "";
            data.playlists.forEach((filename) => {
              let option = document.createElement("option");
              option.value = filename;
              option.textContent = filename;
              playlistSelectEl.appendChild(option);
            });
          })
          .catch((error) => console.error("Error:", error));
      }

      document.getElementById("loadPlaylist").addEventListener("click", function () {
        let filename = playlistSelectEl.value;
        deckname = playlistSelectEl.value.substring(0, playlistSelectEl.value.length - 5);
        if (!filename) {
          alert("No playlist selected.");
          return;
        }
        fetch(`/load-playlist?filename=${encodeURIComponent(filename)}`)
          .then((response) => response.json())
          .then((data) => {
            availableSongs = data.songs;
            playedSongsOrder = playedSongsOrder.filter((song) => availableSongs.includes(song));
            localStorage.setItem("playedSongs", JSON.stringify(playedSongsOrder));
            updateSongListUI();
            updatePlayedSongsUI();
            alert("Playlist loaded with " + availableSongs.length + " songs.");

            if (customInputString === "") {
              let customOut = "";
              availableSongs.forEach((v) => {
                customOut += `${v}\t${v}\n`
              })
              customInputString = customOut;
              cardNameMapping = {};
            }
          })
          .catch((error) => console.error("Error:", error));
      });

      document.getElementById("generateDeck").addEventListener("click", function () {
        if (deckIsGenerated && !confirm("Are you sure you want to generate a new deck?")) {
          return;
        }
        playedSongsOrder = [];
        localStorage.removeItem("playedSongs");
        cardstatsEl.innerHTML = "";
        updateSongListUI();
        updatePlayedSongsUI();

        let deckLength = (availableSongs.length > 80) ? 50 : Math.floor(availableSongs.length / 4) * 2;
        if (deckLength == 0) {
          alert("Please load a deck first.");
          return;
        }
        if (deckLength > availableSongs.length) {
          alert("Advancement: How did we get here? (debug)");
          return;
        }

        stats = {
          "errors": 0,
          "rerolls": 0,
          "correct": 0,
          "timetaken": 0,
          "lastCard": 0
        }

        cardNameMapping = parseCustomInput(customInputString);

        deckList = {}
        cardsLeft = deckLength;

        let songsCopy = availableSongs.slice();
        let p1 = songsCopy.length;
        while (p1 != 0) {
          let p2 = Math.floor(Math.random() * p1);
          p1--;
          [songsCopy[p1], songsCopy[p2]] = [songsCopy[p2], songsCopy[p1]];
        }
        for (i = 0; i < deckLength; i++) {
          deckList[songsCopy[i]] = {};
        }

        gameSpaceEl.innerHTML = "";

        let statsBox = document.createElement("pre");
        statsBox.id = "stats-box";
        gameSpaceEl.appendChild(statsBox);
        updateStatsBox();

        Object.keys(deckList).forEach((songTitle) => {
          gameSpaceEl.appendChild(createCardElement(songTitle));
        });
        deckIsGenerated = true;
      });

      function handleSongChoice(event) {
        if (correct) {
          return;
        }
        if (playedSongsOrder.length < 1) {
          return;
        }
        let target = (event.target.id === "") ? event.target.parentElement : event.target;
        chosenTitle = target.id;
        currentSong = playedSongsOrder[0];
        
        if (currentSong === chosenTitle) {
          correct = true;
          target.removeEventListener("click", handleSongChoice);
          target.innerHTML = "";
          target.style.borderColor = "white";
          target.style.cursor = "auto";
          target.id = "";
          target.draggable = false;
          cardsLeft--;
          console.log("CORRECT, CARDS LEFT:", cardsLeft)

          let timeForCard = Math.round(performance.now() - songStart); 
          deckList[chosenTitle]["timeTaken"] = timeForCard;
          deckList[chosenTitle]["cardsLeft"] = cardsLeft;
          deckList[chosenTitle]["status"] = "correct";
          stats["correct"] += 1;
          stats["timetaken"] += timeForCard;
          stats["lastCard"] = timeForCard;
          updateCardStatsUI();

          if (cardsLeft == 0) {
            alert(`debug: now this is epical, time is ${stats["timetaken"] / 1000}\n
                you got ${stats["correct"]} correct\n
                you made ${stats["errors"]} errors\n
                you received ${stats["rerolls"]} rerolls`);
          }
        } else if (!correct) {
          let songDict = deckList[chosenTitle];
          stats["errors"] += 1;
          if (addNextCard().then((res) => res)) {
            cardsLeft++;
            console.log("INCORRECT, CARDS LEFT:", cardsLeft)
          } else {
            console.log("INCORRECT, CARDS LEFT (OUT OF REPLACEMENTS):", cardsLeft)
          }
        }

        updateStatsBox();
      }

      function handlePreviousSong() {
        if (!correct && playedSongsOrder.length > 0 && Object.keys(deckList).includes(playedSongsOrder[0])) {
          console.log("rerolling card");
          let toReroll = document.getElementById(playedSongsOrder[0]);
          return addNextCard(toReroll).then((res) => {
            if (!res) {
              toReroll.removeEventListener("click", handleSongChoice);
              toReroll.innerHTML = "";
              toReroll.style.borderColor = "white";
              cardsLeft--;
              console.log("FAILED REROLL, CARDS LEFT:", cardsLeft)
            }
            let timeForCard = Math.round(performance.now() - songStart); 
            deckList[playedSongsOrder[0]]["status"] = "rerolled";
            deckList[playedSongsOrder[0]]["timeTaken"] = timeForCard;
            deckList[playedSongsOrder[0]]["cardsLeft"] = cardsLeft;
            stats["timetaken"] += timeForCard;
            stats["lastCard"] = timeForCard;
            stats["rerolls"] += 1;
            updateCardStatsUI();
            updateStatsBox();
            console.log("SUCCESSFUL REROLL, CARDS LEFT:", cardsLeft)
            return true;
          });
        }
      }

      function parseCustomInput(input) {
        let out = {}
        try {
          out = JSON.parse(input);
        } catch (error) {
          console.log("custom input is not json, attempting sheet parse")
        }
        let lines = input.split(/\r?\n/);
        lines.forEach((line) => {
          let parts = line.split(/\t/);
          if (parts.length === 2) {
            out[parts[0]] = parts[1]
          }
        })
        return out;
      }

      function addNextCard(toReplace = null) {
        let remainingCards = availableSongs.filter((song) => {
          return !playedSongsOrder.includes(song) && !Object.keys(deckList).includes(song);
        });

        return new Promise((resolve) => {
          
          if (remainingCards.length === 0) {
            resolve(false);
          }

          nextCardTitle = remainingCards[Math.floor(Math.random() * remainingCards.length)];

          if (toReplace === null) {
            let found = false;
            for (const child of gameSpaceEl.children) {
              if (child.id == "" || child.id == null) {
                gameSpaceEl.replaceChild(createCardElement(nextCardTitle), child);
                found = true;
                break;
              }
            }
            if (!found) {
              gameSpaceEl.appendChild(createCardElement(nextCardTitle));
            }
            resolve(true);
          } else {
            toReplace.style.outline = "4px solid red";
            toReplace.style.outlineOffset = "-4px";
            playRandomEl.disabled = true;
            playNextEl.disabled = true;
            correct = true;
            console.log(correct);
            setTimeout(() => {
              gameSpaceEl.replaceChild(createCardElement(nextCardTitle), toReplace);
              let next = document.getElementById(nextCardTitle);
              toReplace.style.outline = "4px solid red";
              toReplace.style.outlineOffset = "-4px";
              setTimeout(() => {
                toReplace.style.outline = "";
                toReplace.style.outlineOffset = "";
                playRandomEl.disabled = false;
                playNextEl.disabled = false;
                correct = false;
                resolve(true);
              }, 1500);
            }, 1500);
          }
        });
      }

      function createCardElement(songTitle) {
        let songCard = document.createElement("div");

        let cardImage = document.createElement("img");
        let cardText = document.createElement("div");
        songCard.appendChild(cardImage);
        songCard.appendChild(cardText);
          
        songCard.className = "card";
        songCard.id = songTitle;
        cardImage.className = "card-image";
        cardText.className = "card-text";
        cardImage.draggable = false;
        songCard.draggable = true;

        let cardTitle = (cardNameMapping[songTitle] != undefined) ? cardNameMapping[songTitle] : songTitle;

        songCard.addEventListener("click", handleSongChoice);

        songCard.addEventListener("dragenter", (event) => {
          event.preventDefault()
          if (correct && dragged != null) {
            const draggedElementId = event.dataTransfer.getData("text/plain");
            songCard.style.outline = "4px solid #6fb5cf";
            songCard.style.outlineOffset = "-4px";
          }
        });

        songCard.addEventListener("dragover", (event) => {
          event.preventDefault();
        })

        songCard.addEventListener("dragleave", (event) => {
          if (correct && dragged != null && !songCard.contains(event.relatedTarget)) {
            songCard.style.outline = "";
            songCard.style.outlineOffset = "";
          }
        });

        songCard.addEventListener("dragstart", (event) => {
          if (correct) {
            dragged = event.target;
          }
        });

        songCard.addEventListener("dragend", (event) => {
          if (correct) {
            dragged = null;
          }
        });

        songCard.addEventListener("drop", (event) => {
          if (correct && dragged != null) {
            songCard.style.outline = "";
            songCard.style.outlineOffset = "";

            let dummy = createCardElement("");
            gameSpaceEl.replaceChild(dummy, dragged);
            gameSpaceEl.replaceChild(dragged, songCard);
            gameSpaceEl.replaceChild(songCard, dummy);
          }
        });

        if (cardTitle.slice(-4) != ".mp3") {
          cardText.innerHTML = cardTitle;
        } else {
          cardText.innerHTML = cardTitle.slice(0, -4);
        }
        cardImage.src = images[songTitle] || "";

        deckList[songTitle] = {}

        return songCard;
      }

      function updateStatsBox() {
        document.getElementById("stats-box").innerHTML = JSON.stringify(stats, null, 2).replace(/[{}"]/g, "");
      }

      function loadCustom() {
        fetch("/get-mapping?filename=" + playlistSelectEl.value)
        .then(response => response.json())
        .then(data => {
          if (data.error) {
            alert(data.error);
          } else {
            customString = "";
            Object.keys(data).forEach((k) => {
              customString += `${k}\t${data[k]}\n`;
            });
            customInputString = customString;
          }
        });

        fetch("/get-images?filename=" + playlistSelectEl.value)
        .then(response => response.json())
        .then(data => {
          if (data.error) {
            alert(data.error);
          } else {
            Object.keys(data).forEach((k) => {
              images[k] = data[k];
            })
          }
        });
      }

      function confirmNavigation() {
        if (confirm("Are you sure you want to leave the room?")) {
          socket.emit('leave_room', { room: room_key, player_id: playerID });
        }
        return res
      }

      loadPlaylistsList();
    </script>
  </body>
</html>
