<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Karuta Player</title>
    <style>
      #go-home {
        position: absolute;
        right: 100px;
        top: 30px;
        padding: 5px;
      }
      #go-practice {
        position: absolute;
        right: 30px;
        top: 30px;
        padding: 5px;
      }
      #go-edit {
          position: absolute;
          right: 170px;
          top: 30px;
          padding: 5px;
      }
      .navigation:hover {
        background-color: lightblue;
        cursor: default;
        color: black;
        text-decoration: none;
      }
      .resize {
        resize: both;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>Karuta (grahic design is my passion)</h1>
    <a href="/"><div id="go-home" class="navigation">Home</div></a>
    <a href="/practice"><div id="go-practice" class="navigation">Practice</div></a>
    <button id="create-room" onclick="sendCreateRequest()">Create a Room</button>
    <br>
    <input type="text" id="room-code-input" placeholder="Enter a Room Code"/>
    <button id="join-room" onclick="sendJoinRequest()">Join a Room</button>
    <script>
      let roomCodeEl = document.getElementById("room-code-input");

      roomCodeEl.addEventListener("input", (event) => {
        event.target.value = event.target.value.toUpperCase();
      })

      function sendCreateRequest() {
        fetch("/create-room-rq")
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json()
        })
        .then(data => {
          const regexTest = /^\/multiplayer\?room=[A-Z]{4}$/
          if (!regexTest.test(data.url)) {
            throw new Error('Returned URL not ok');
          }
          window.location.href = data.url;
        })
        .catch((error) => console.error("Error:", error));
      }

      function sendJoinRequest() {
        let code = roomCodeEl.value
        const regexTest = /^[A-Z]+$/;
        if (code.length != 4 || !regexTest.test(code)) {
          alert("Please enter a valid code.");
          return;
        }

        fetch("/join-room-rq", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ room_code: code })
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json()
        })
        .then(data => {
          if (data.url == undefined || data.url === "") {
            alert("The room you are trying to enter is full or invalid");
            return;
          }
          const regexTest = /^\/multiplayer\?room=[A-Z]{4}$/
          if (!regexTest.test(data.url)) {
            throw new Error('Returned URL not ok');
          }
          window.location.href = data.url;
        })
        .catch((error) => console.error("Error:", error));
      }
    </script>
  </body>
</html>
